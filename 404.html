<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z2B49SYCX0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-Z2B49SYCX0');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dahlke Media | 404 Page Not Found</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Custom Scrollbar Style -->
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 flex flex-col min-h-screen">

    <!-- PLACEHOLDER FOR NAVIGATION -->
    <div id="global-nav"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-grow flex items-center justify-center pt-20 px-4">
        
        <section class="max-w-2xl mx-auto text-center">
            <div class="relative z-10">
                <!-- Background blur effect from your styling -->
                <div class="absolute -top-10 left-1/2 transform -translate-x-1/2 w-64 h-64 bg-blue-600/20 rounded-full blur-3xl -z-10"></div>
                
                <h1 class="text-8xl md:text-9xl font-extrabold text-blue-500 mb-6 drop-shadow-lg">
                    404
                </h1>
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">
                    Page Not Found
                </h2>
                <p class="text-xl text-slate-400 mb-10">
                    Oops! The page you are looking for doesn't exist or has been moved. 
                    <br><br>
                    Redirecting you back in <span id="countdown" class="text-blue-400 font-bold">5</span> seconds...
                </p>
                
                <div class="flex justify-center">
                    <button onclick="goBack()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-blue-500 transition shadow-lg shadow-blue-900/50">
                        Go Back Now
                    </button>
                </div>
            </div> 
        </section>

    </main>

    <!-- PLACEHOLDER FOR FOOTER -->
    <div id="global-footer"></div>

    <!-- LINK TO SHARED LAYOUT FILE -->
    <script src="layout.js"></script>

    <!-- Auto-Redirect Logic -->
    <script>
        let secondsLeft = 5;
        const countdownElement = document.getElementById('countdown');

        function goBack() {
            // Check if there is a previous page in the history, otherwise go to home
            if (window.history.length > 1 && document.referrer !== "") {
                window.history.back();
            } else {
                window.location.href = '/'; 
            }
        }

        const timer = setInterval(() => {
            secondsLeft--;
            countdownElement.textContent = secondsLeft;
            
            if (secondsLeft <= 0) {
                clearInterval(timer);
                goBack();
            }
        }, 1000); // Run every 1000ms (1 second)
    </script>

</body>
</html>
